name: 爬取课文资料

on:
  workflow_dispatch:
    inputs:
      lesson_name:
        description: '课文名称或带链接的合并参数'
        required: true

permissions:
  contents: write

jobs:
  crawl_and_generate:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 运行爬虫和 AI
      run: python crawler.py "${{ github.event.inputs.lesson_name }}"
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    - name: 提交并推送生成的笔记
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/*.md
        git commit -m "自动生成笔记: ${{ github.event.inputs.lesson_name }}" || echo "没有文件需要更新"
        git pull --rebase origin main
        git push origin main
