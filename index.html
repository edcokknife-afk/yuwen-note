<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语文笔记生成器 - 智能直达版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #7b92b5 0%, #8b78e6 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        header p { font-size: 1rem; opacity: 0.9; }
        
        .search-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin-bottom: 30px; }
        
        /* 优化的输入框布局 */
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        .input-row { display: flex; gap: 15px; width: 100%; }
        .input-group input {
            flex: 1; padding: 15px 20px; font-size: 1rem;
            border: 2px solid #e0e0e0; border-radius: 12px; outline: none; transition: border-color 0.3s;
        }
        .input-group input:focus { border-color: #8b78e6; }
        .input-group button {
            padding: 15px 30px; font-size: 1rem; white-space: nowrap;
            background: linear-gradient(135deg, #8b78e6 0%, #6c5ce7 100%);
            color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: all 0.3s ease;
        }
        .input-group button:hover { opacity: 0.9; transform: translateY(-1px); }
        .input-group button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        .warning { background: #fff8e1; color: #f57f17; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 0.85rem; text-align: center; }
        .token-status { margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 0.85rem; text-align: center; }
        .token-ok { background: #e8f5e9; color: #2e7d32; }
        .token-missing { background: #ffebee; color: #c62828; }
        
        .loading { background: white; border-radius: 20px; padding: 40px; text-align: center; display: none; }
        .spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #8b78e6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .result-card { background: white; border-radius: 20px; overflow: hidden; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .result-header { background: #f8f9fa; padding: 20px 30px; border-bottom: 2px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { padding: 10px 20px; background: #52b788; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .note-content { padding: 40px; line-height: 1.8; max-height: 700px; overflow-y: auto; }
        
        /* 🔥 完美复刻截图的绿色精美表格 */
        .markdown-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.95rem; border: 1px solid #e0e0e0; }
        .markdown-table th { background-color: #52b788; color: white; font-weight: 600; padding: 15px 10px; border: 1px solid #e0e0e0; text-align: left; }
        .markdown-table td { padding: 12px 10px; border: 1px solid #e0e0e0; vertical-align: top; }
        .markdown-table tr:nth-child(even) { background-color: #f1faee; } /* 浅绿色交替行 */
        .markdown-table tr:hover { background-color: #e6f2eb; }
        
        .error-card { background: #ffebee; color: #c62828; padding: 20px; border-radius: 12px; display: none; margin-top: 20px; }
        .progress-info { margin-top: 10px; font-size: 0.85rem; color: #666; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕷️ 语文笔记生成器 · AI智能版</h1>
            <p>支持输入指定文章链接爬取 | 强制刷新无缓存</p>
        </header>
        
        <div class="search-card">
            <div class="input-group">
                <div class="input-row">
                    <input type="text" id="lessonName" placeholder="输入课文名称 (必填)，例如：海底世界升级版" />
                    <button id="generateBtn" onclick="generateNote()">🚀 重新生成笔记</button>
                </div>
                <input type="text" id="lessonUrl" placeholder="输入指定原文链接 (选填)，例如：https://hanchacha.com/..." />
            </div>
            <div class="warning">
                ⚡ 提示：填入链接可精准抓取指定文章；若不填链接，则自动根据课文名称在网站内搜索。
            </div>
            <div id="tokenStatus" class="token-status token-missing">正在检测 Token...</div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p id="loadingText">📡 正在触发云端...</p>
            <div class="progress-info" id="progressInfo"></div>
        </div>
        
        <div id="resultCard" class="result-card">
            <div class="result-header">
                <h2>📖 笔记已生成</h2>
                <button class="copy-btn" onclick="copyNote()">📋 复制 Markdown</button>
            </div>
            <div id="noteContent" class="note-content"></div>
        </div>
        <div id="errorCard" class="error-card"></div>
    </div>

    <script>
        const REPO_OWNER = "finnlove";
        const REPO_NAME = "yuwen-note";
        let rawMarkdown = "";
        
        function checkTokenStatus() {
            const token = localStorage.getItem('github_token');
            const statusDiv = document.getElementById('tokenStatus');
            if (token && token.startsWith('ghp_')) {
                statusDiv.innerHTML = '✅ GitHub Token 已配置，爬虫功能可用！每次都会重新生成。';
                statusDiv.className = 'token-status token-ok';
                return true;
            } else {
                statusDiv.innerHTML = '⚠️ 未配置 Token。请按 F12 在 Console 输入：localStorage.setItem("github_token", "你的Token")';
                statusDiv.className = 'token-status token-missing';
                return false;
            }
        }
        
        async function generateNote() {
            const lessonName = document.getElementById('lessonName').value.trim();
            const lessonUrl = document.getElementById('lessonUrl').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            if (!lessonName) { alert('必须输入课文名称（用于保存文件名）！'); return; }
            
            generateBtn.disabled = true;
            generateBtn.textContent = '⏳ 生成中...';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('errorCard').style.display = 'none';
            
            const token = localStorage.getItem('github_token');
            try {
                if (!token) throw new Error('Token缺失');
                
                // 【核心黑科技】：把名字和链接用 ||| 拼起来发给后端，避免修改 GitHub Action 配置
                const payloadStr = lessonUrl ? `${lessonName}|||${lessonUrl}` : lessonName;
                
                document.getElementById('loadingText').innerHTML = '📡 正在唤醒云端服务器...';
                const triggered = await triggerWorkflow(payloadStr, token);
                if (!triggered) throw new Error('唤醒云端失败，检查 Token 权限');
                
                document.getElementById('loadingText').innerHTML = lessonUrl ? '🎯 正在定点抓取您提供的链接...' : '🕷️ 正在自动搜索并抓取网页...';
                const note = await pollForNewResult(lessonName, 60, 4000);
                
                if (note) {
                    rawMarkdown = note;
                    displayNote(note);
                    document.getElementById('loading').style.display = 'none';
                } else {
                    throw new Error('超时，请稍后刷新重试。');
                }
            } catch (error) {
                document.getElementById('errorCard').innerHTML = `❌ ${error.message}`;
                document.getElementById('errorCard').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '🚀 重新生成笔记';
            }
        }
        
        async function triggerWorkflow(payloadStr, token) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/crawl.yml/dispatches`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ ref: 'main', inputs: { lesson_name: payloadStr } })
            });
            return response.ok;
        }
        
        async function pollForNewResult(lessonName, maxAttempts, interval) {
            for (let i = 0; i < maxAttempts; i++) {
                await new Promise(r => setTimeout(r, interval));
                if (i > 8) document.getElementById('loadingText').innerHTML = '🤖 抓取成功！AI 正在按图纸排版表格...';
                document.getElementById('progressInfo').innerHTML = `⏳ 等待 ${ (i*interval/1000).toFixed(0) } 秒 / 240 秒`;
                try {
                    const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/data/${encodeURIComponent(lessonName)}.md?t=${new Date().getTime()}`;
                    const response = await fetch(url, { cache: 'no-cache' });
                    if (response.ok) {
                        const note = await response.text();
                        if (note && note.length > 500 && !note.includes('正在努力生成中')) return note;
                    }
                } catch(e) {}
            }
            return null;
        }
        
        function displayNote(note) {
            let lines = note.split('\n');
            let htmlResult = "";
            let inTable = false;
            let tableRows = [];
            
            for (let line of lines) {
                let trimmed = line.trim();
                if (trimmed.startsWith('|')) {
                    if (trimmed.includes('---')) continue;
                    inTable = true;
                    tableRows.push(trimmed);
                    continue;
                } else {
                    if (inTable) { htmlResult += renderCustomTable(tableRows); tableRows = []; inTable = false; }
                }
                
                if (trimmed.startsWith('# ')) { htmlResult += `<h1 style="color:#2b2d42; margin:25px 0 15px;">${trimmed.replace('# ', '')}</h1>`; }
                else if (trimmed.startsWith('## ')) { htmlResult += `<h2 style="background-color:#52b788; color:white; padding:8px 15px; border-radius:5px; margin:25px 0 15px; display:inline-block;">${trimmed.replace('## ', '')}</h2><br>`; }
                else if (trimmed.startsWith('### ')) { htmlResult += `<h3 style="color:#2d6a4f; margin:15px 0 8px;">${trimmed.replace('### ', '')}</h3>`; }
                else if (trimmed.startsWith('> ')) { htmlResult += `<blockquote style="background:#f1faee; border-left:5px solid #52b788; padding:12px 20px; margin:15px 0; border-radius:4px;">${trimmed.replace('> ', '')}</blockquote>`; }
                else if (trimmed !== "") { htmlResult += `<p style="margin-bottom:12px;">${trimmed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`; }
            }
            if (inTable) htmlResult += renderCustomTable(tableRows);
            document.getElementById('noteContent').innerHTML = htmlResult;
            document.getElementById('resultCard').style.display = 'block';
        }
        
        function renderCustomTable(rows) {
            if (rows.length === 0) return "";
            let html = '<table class="markdown-table">';
            rows.forEach((row, index) => {
                let cells = row.split('|').map(c => c.trim()).filter((c, i, arr) => i > 0 && i < arr.length - 1);
                html += '<tr>';
                cells.forEach(cell => { html += index === 0 ? `<th>${cell}</th>` : `<td>${cell.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</td>`; });
                html += '</tr>';
            });
            return html + '</table>';
        }
        checkTokenStatus();
    </script>
</body>
</html>
